<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação CSAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            width: 100%;
            max-width: 600px;
        }

        .header {
            margin-bottom: 25px;
            text-align: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .header p {
            color: #7f8c8d;
            font-size: 13px;
        }

        /* Loading Spinner */
        .spinner-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner-overlay.active {
            display: flex;
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-radius: 50%;
            border-top: 4px solid #667eea;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Survey Form */
        .survey-form {
            display: none;
        }

        .survey-form.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .rating-options {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            flex-wrap: wrap;
        }

        .rating-btn {
            flex: 1;
            min-width: calc(20% - 5px);
            padding: 10px 6px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            overflow: hidden;
        }

        .rating-btn:hover {
            border-color: #667eea;
            background: #f8f9fa;
            transform: scale(1.05);
        }

        .rating-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .rating-label {
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .conditional-question {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .conditional-question.active {
            display: block;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.2s ease;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 11px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .submit-btn {
            background: #667eea;
            color: white;
        }

        .submit-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .reset-btn {
            background: #ecf0f1;
            color: #2c3e50;
        }

        .reset-btn:hover {
            background: #d5dbde;
        }

        /* Already Submitted Message */
        .already-submitted {
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease-in;
        }

        .already-submitted.active {
            display: block;
        }

        .already-submitted-icon {
            font-size: 44px;
            margin-bottom: 12px;
        }

        .already-submitted h2 {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .already-submitted p {
            color: #7f8c8d;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Error Message */
        .error-message {
            display: none;
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .error-message.active {
            display: block;
        }

        /* Success Message */
        .success-message {
            display: none;
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #3c3;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .success-message.active {
            display: block;
        }

        /* Mobile Extra Small - Até 350px */
        @media (max-width: 350px) {
            body {
                padding: 5px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            .header h1 {
                font-size: 18px;
                margin-bottom: 5px;
            }

            .header p {
                font-size: 11px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-group label {
                font-size: 12px;
                margin-bottom: 8px;
            }

            .rating-options {
                gap: 4px;
            }

            .rating-btn {
                min-width: calc(20% - 3px);
                padding: 8px 4px;
                font-size: 20px;
                gap: 2px;
            }

            .rating-label {
                font-size: 8px;
            }

            select, textarea {
                padding: 8px;
                font-size: 12px;
            }

            textarea {
                min-height: 70px;
            }

            .button-group {
                gap: 6px;
                margin-top: 15px;
            }

            button {
                padding: 9px 12px;
                font-size: 12px;
            }

            .already-submitted-icon {
                font-size: 40px;
                margin-bottom: 8px;
            }

            .already-submitted h2 {
                font-size: 16px;
                margin-bottom: 6px;
            }

            .already-submitted p {
                font-size: 12px;
            }
        }

        /* Mobile Small - 351px a 480px */
        @media (min-width: 351px) and (max-width: 480px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .rating-btn {
                min-width: calc(20% - 5px);
                padding: 10px 6px;
                font-size: 22px;
            }

            .rating-label {
                font-size: 9px;
            }

            select, textarea {
                padding: 10px;
                font-size: 13px;
            }

            button {
                padding: 10px 14px;
                font-size: 13px;
            }
        }

        /* Tablet e acima */
        @media (min-width: 481px) {
            .container {
                padding: 30px;
            }

            .rating-btn {
                padding: 15px;
                font-size: 28px;
                min-width: auto;
            }

            .rating-label {
                font-size: 12px;
            }

            button {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Spinner -->
    <div class="spinner-overlay" id="spinnerOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Pesquisa de Satisfação</h1>
            <p>Sua opinião é importante para nós</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage"></div>

        <!-- Survey Form -->
        <form class="survey-form" id="surveyForm">
            <!-- Pergunta 1: Rating -->
            <div class="form-group">
                <label for="rating">Como você avalia o atendimento recebido?</label>
                <div class="rating-options">
                    <button type="button" class="rating-btn" data-value="1" data-emoji="😞" data-label="Very Unsatisfied">
                        <span>😞</span>
                        <span class="rating-label">Péssimo</span>
                    </button>
                    <button type="button" class="rating-btn" data-value="2" data-emoji="😕" data-label="Unsatisfied">
                        <span>😕</span>
                        <span class="rating-label">Ruim</span>
                    </button>
                    <button type="button" class="rating-btn" data-value="3" data-emoji="😐" data-label="Neutral">
                        <span>😐</span>
                        <span class="rating-label">Neutro</span>
                    </button>
                    <button type="button" class="rating-btn" data-value="4" data-emoji="🙂" data-label="Satisfied">
                        <span>🙂</span>
                        <span class="rating-label">Bom</span>
                    </button>
                    <button type="button" class="rating-btn" data-value="5" data-emoji="😊" data-label="Very Satisfied">
                        <span>😊</span>
                        <span class="rating-label">Excelente</span>
                    </button>
                </div>
            </div>

            <!-- Pergunta 2: Reason (Condicional - Aparece quando rating <= 3) -->
            <div class="form-group conditional-question" id="reasonSection">
                <label for="reason">Selecione um motivo relacionado à sua experiência.</label>
                <select id="reason" required>
                    <option value="">Escolha uma opção...</option>
                    <option value="01JBW4BRF2AWJSK5R2Y59KR0A8" data-label="O problema demorou muito para ser resolvido.">O problema demorou muito para ser resolvido.</option>
                    <option value="01JBW4BRF23G576BQXSWSF9AQW" data-label="O problema não foi resolvido.">O problema não foi resolvido.</option>
                    <option value="01JBW4BRF2FBMX8E3NXHV29FXW" data-label="As informações fornecidas não eram claras nem úteis.">As informações fornecidas não eram claras nem úteis.</option>
                </select>
            </div>

            <!-- Pergunta 3: Impressions/Comment -->
            <div class="form-group conditional-question" id="commentSection">
                <label for="comment">Você gostaria de comentar sobre sua experiência? (Opcional)</label>
                <textarea id="comment" placeholder="Digite seu comentário aqui..."></textarea>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="submit-btn" id="submitBtn">Enviar</button>
                <button type="reset" class="reset-btn" id="resetBtn">Limpar</button>
            </div>
        </form>

        <!-- Already Submitted Message -->
        <div class="already-submitted" id="alreadySubmitted">
            <div class="already-submitted-icon">✅</div>
            <h2>Obrigado!</h2>
            <p>Sua resposta já foi registrada. Agradecemos por compartilhar seu feedback conosco.</p>
        </div>
    </div>

    <script>
        // Get ticket ID from URL params
        function getTicketId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('ticketId');
        }

        // Show/hide spinner
        function showSpinner(show = true) {
            const spinner = document.getElementById('spinnerOverlay');
            if (show) {
                spinner.classList.add('active');
            } else {
                spinner.classList.remove('active');
            }
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
            setTimeout(() => {
                errorEl.classList.remove('active');
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('active');
            setTimeout(() => {
                successEl.classList.remove('active');
            }, 3000);
        }

        // Check if survey was already submitted
        async function checkSurveyStatus() {
            const ticketId = getTicketId();
            
            if (!ticketId) {
                showError('ID do ticket não fornecido. Verifique a URL.');
                return false;
            }

            try {
                showSpinner(true);

                const response = await fetch(`/api/check-survey-status?ticketId=${encodeURIComponent(ticketId)}`);
                const data = await response.json();

                showSpinner(false);

                if (!response.ok) {
                    console.warn('Erro ao verificar status:', data.error);
                    return false;
                }

                return data.alreadySubmitted === true;
            } catch (error) {
                console.error('Erro ao verificar survey status:', error);
                showSpinner(false);
                showError('Erro ao verificar status da pesquisa. Tente novamente.');
                return false;
            }
        }

        // Initialize rating buttons
        function initRatingButtons() {
            const ratingBtns = document.querySelectorAll('.rating-btn');
            const reasonSection = document.getElementById('reasonSection');
            const commentSection = document.getElementById('commentSection');
            const reasonSelect = document.getElementById('reason');

            ratingBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();

                    // Remove active class from all buttons
                    ratingBtns.forEach(b => b.classList.remove('active'));

                    // Add active class to clicked button
                    btn.classList.add('active');

                    const rating = parseInt(btn.dataset.value);

                    // Mostrar Pergunta 2 (Reason) apenas se rating <= 3 (Péssimo, Ruim, Neutro)
                    if (rating <= 3) {
                        reasonSection.classList.add('active');
                        reasonSelect.setAttribute('required', 'required');
                    } else {
                        reasonSection.classList.remove('active');
                        reasonSelect.removeAttribute('required');
                        reasonSelect.value = ''; // Reset reason select
                    }

                    // Sempre mostrar Pergunta 3 (Comment)
                    commentSection.classList.add('active');
                });
            });
        }

        // Handle form submission
        async function handleSubmit(e) {
            e.preventDefault();

            const ticketId = getTicketId();
            const ratingBtn = document.querySelector('.rating-btn.active');
            const reasonSelect = document.getElementById('reason');
            const reasonId = reasonSelect.value || null;
            const reasonLabel = reasonId ? reasonSelect.options[reasonSelect.selectedIndex].getAttribute('data-label') : null;
            const comment = document.getElementById('comment').value;

            if (!ratingBtn) {
                showError('Por favor, selecione uma avaliação.');
                return;
            }

            const rating = parseInt(ratingBtn.dataset.value);
            const ratingLabel = ratingBtn.dataset.label;

            // Validar que reason é obrigatório se rating <= 3
            if (rating <= 3 && !reasonId) {
                showError('Por favor, selecione um motivo para sua avaliação.');
                return;
            }

            try {
                showSpinner(true);

                const response = await fetch('/api/submit-survey', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ticketId,
                        rating,
                        ratingLabel,
                        reasonId,
                        reasonLabel,
                        impressions: comment || null,
                    }),
                });

                const data = await response.json();
                showSpinner(false);

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao enviar pesquisa');
                }

                showSuccess('✅ Pesquisa enviada com sucesso!');

                // Hide form and show submitted message
                setTimeout(() => {
                    showAlreadySubmitted();
                }, 1500);
            } catch (error) {
                showSpinner(false);
                console.error('Erro ao enviar pesquisa:', error);
                showError(`Erro ao enviar: ${error.message}`);
            }
        }

        // Show form or already submitted message
        function showForm() {
            document.getElementById('surveyForm').classList.add('active');
            document.getElementById('alreadySubmitted').classList.remove('active');
        }

        function showAlreadySubmitted() {
            document.getElementById('surveyForm').classList.remove('active');
            document.getElementById('alreadySubmitted').classList.add('active');
        }

        // Initialize on page load
        async function init() {
            showSpinner(true);

            const alreadySubmitted = await checkSurveyStatus();

            showSpinner(false);

            if (alreadySubmitted) {
                showAlreadySubmitted();
            } else {
                showForm();
                initRatingButtons();

                // Attach form submission handler
                document.getElementById('surveyForm').addEventListener('submit', handleSubmit);

                // Reset button handler
                document.getElementById('resetBtn').addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));
                    document.getElementById('reasonSection').classList.remove('active');
                    document.getElementById('reason').value = '';
                    document.getElementById('commentSection').classList.remove('active');
                    document.getElementById('comment').value = '';
                });
            }
        }

        // Run on DOM ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
